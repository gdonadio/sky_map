name: Generate Sky Map

on:
  schedule:
    - cron: "28,58 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate sky map
        run: python sky_map_bw.py

      - name: Commit updated image
        id: commit_image
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/sky_map_bw.png
          if git diff --cached --quiet; then
            echo "created_commit=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Update sky map image"
            echo "created_commit=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push changes
        if: steps.commit_image.outputs.created_commit == 'true'
        run: git push origin main
